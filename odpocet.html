<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Odpočet</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    #countdown {
      background: url("velaris.jpg") no-repeat center/cover;
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* overlay pro čitelnost */
    #countdown::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    #countdown * {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin-bottom: 20px;
    }

    .time {
      font-size: 2.5rem;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div id="countdown">
  <h1>Do vydání ACOTAR 6 zbývá:</h1>
  <div class="time" id="days"></div>
  <div class="time" id="hours"></div>
  <div class="time" id="minutes"></div>
  <div class="time" id="seconds"></div>
</div>

<script>
  const targetDate = new Date(2026, 09, 26, 07, 00, 00).getTime();

  const updateCountdown = () => {
    const now = new Date().getTime();
    const diff = targetDate - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerHTML = `
        <h1>There you are</h1>
        <p>I'm looking for you</p>
      `;
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);

    const days = Math.floor(totalSeconds / (24 * 60 * 60));
    const hours = Math.floor((totalSeconds % (24 * 60 * 60)) / (60 * 60));
    const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
    const seconds = totalSeconds % 60;

    document.getElementById("days").innerText = days + " dní";
    document.getElementById("hours").innerText = hours + " hodin";
    document.getElementById("minutes").innerText = minutes + " minut";
    document.getElementById("seconds").innerText = seconds + " sekund";
  };

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>

</body>
</html>
